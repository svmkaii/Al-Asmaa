services:
  - type: web
    name: al-asmaa
    runtime: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SITE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EDITORIAL_REVIEW_TOKEN
        sync: false
