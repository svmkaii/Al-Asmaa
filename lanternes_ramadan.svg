<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="goldFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE7A3"/>
      <stop offset="28%" stop-color="#F6C864"/>
      <stop offset="55%" stop-color="#D89E2C"/>
      <stop offset="78%" stop-color="#B97A12"/>
      <stop offset="100%" stop-color="#F4D27E"/>
    </linearGradient>
    <linearGradient id="blueGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CFF8FF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#49CDE3" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#0D5DAA" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="emeraldGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2FFF0" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#52E4AC" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#118B72" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="violetGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCEBFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#CE67F2" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#6D2E9F" stop-opacity="0.78"/>
    </linearGradient>

    <radialGradient id="candleGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFF8D6" stop-opacity="1"/>
      <stop offset="45%" stop-color="#FFD56A" stop-opacity="0.95"/>
      <stop offset="75%" stop-color="#FFB347" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF9F1C" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0
                0 0.9 0 0 0
                0 0 0.5 0 0
                0 0 0 0.9 0"/>
    </filter>

    <filter id="metalShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#4A2C00" flood-opacity="0.35"/>
    </filter>

    <pattern id="arabesqueDots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="1.3" fill="#F8E1A0" opacity="0.45"/>
      <circle cx="0" cy="0" r="1.1" fill="#F8E1A0" opacity="0.25"/>
      <circle cx="18" cy="18" r="1.1" fill="#F8E1A0" opacity="0.25"/>
    </pattern>

    <g id="starCut">
      <path d="M0,-8 L2.4,-2.8 L8,0 L2.4,2.8 L0,8 L-2.4,2.8 L-8,0 L-2.4,-2.8 Z" fill="none" stroke="url(#goldFrame)" stroke-width="1.7" stroke-linejoin="round"/>
      <path d="M0,-5.2 L1.6,-1.8 L5.2,0 L1.6,1.8 L0,5.2 L-1.6,1.8 L-5.2,0 L-1.6,-1.8 Z" fill="#FFFFFF" fill-opacity="0.08"/>
    </g>

    <g id="crescentCut">
      <path d="M0 -11
               A11 11 0 1 1 0 11
               A8 8 0 1 0 0 -11Z"
            fill="none" stroke="url(#goldFrame)" stroke-width="1.5"/>
    </g>

    <g id="lanternBodyTemplate">
      <path d="M0 -280 L0 -238" stroke="url(#goldFrame)" stroke-width="4" stroke-linecap="round"/>
      <path d="M0 -278 C-16 -268 -16 -248 0 -238 C16 -248 16 -268 0 -278Z" fill="none" stroke="url(#goldFrame)" stroke-width="2"/>
      <path d="M0 -258 C-9 -252 -9 -244 0 -238 C9 -244 9 -252 0 -258Z" fill="none" stroke="url(#goldFrame)" stroke-width="1.5" opacity="0.8"/>

      <path d="M-26 -238 Q0 -263 26 -238" stroke="url(#goldFrame)" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M-18 -236 H18" stroke="url(#goldFrame)" stroke-width="4" stroke-linecap="round"/>

      <path d="M-64 -236
               L-74 -205
               Q-41 -206 -22 -187
               L0 -204
               L22 -187
               Q41 -206 74 -205
               L64 -236 Z"
            fill="url(#goldFrame)" opacity="0.95" filter="url(#metalShadow)"/>
      <path d="M-52 -225 L-40 -205 L-24 -219 L0 -200 L24 -219 L40 -205 L52 -225"
            stroke="#FFE9B2" stroke-opacity="0.65" stroke-width="2" fill="none"/>

      <rect x="-68" y="-188" width="136" height="26" rx="7" fill="url(#goldFrame)" filter="url(#metalShadow)"/>
      <rect x="-58" y="-182" width="116" height="5" rx="2.5" fill="#FFF3C8" opacity="0.65"/>

      <path d="M-78 -162
               Q-95 -132 -95 -100
               L-95 60
               Q-95 102 -70 122
               Q-46 140 0 152
               Q46 140 70 122
               Q95 102 95 60
               L95 -100
               Q95 -132 78 -162
               Z"
            fill="url(#goldFrame)" opacity="0.92" filter="url(#metalShadow)"/>

      <path d="M-67 -146
               Q-82 -121 -82 -95
               L-82 54
               Q-82 88 -61 106
               Q-39 124 0 134
               Q39 124 61 106
               Q82 88 82 54
               L82 -95
               Q82 -121 67 -146
               Z"
            fill="#6F4300" opacity="0.16" stroke="#FFE7A6" stroke-opacity="0.55" stroke-width="1.5"/>

      <path d="M0 -145 V136" stroke="#FFEAB7" stroke-width="3" opacity="0.8"/>
      <path d="M-55 -129 Q-45 -2 -55 119" stroke="#FFEAB7" stroke-width="2.2" opacity="0.7"/>
      <path d="M55 -129 Q45 -2 55 119" stroke="#FFEAB7" stroke-width="2.2" opacity="0.7"/>

      <path d="M-78 -162 Q-62 -132 -62 -98 L-62 102" stroke="#FBE3A4" stroke-opacity="0.65" stroke-width="2" fill="none"/>
      <path d="M78 -162 Q62 -132 62 -98 L62 102" stroke="#FBE3A4" stroke-opacity="0.65" stroke-width="2" fill="none"/>

      <path d="M-82 118 Q0 165 82 118 L68 176 Q0 208 -68 176 Z"
            fill="url(#goldFrame)" filter="url(#metalShadow)"/>
      <path d="M-54 155 Q0 186 54 155" stroke="#FFF0C1" stroke-opacity="0.7" stroke-width="2" fill="none"/>
      <rect x="-50" y="178" width="100" height="18" rx="7" fill="url(#goldFrame)"/>
      <circle cx="0" cy="196" r="5.5" fill="#C98716"/>
      <circle cx="0" cy="196" r="2.2" fill="#FFEAB7"/>

      <g opacity="0.9">
        <circle cx="-72" cy="-175" r="3.2" fill="#FFEAB7"/>
        <circle cx="72" cy="-175" r="3.2" fill="#FFEAB7"/>
        <circle cx="-66" cy="126" r="2.8" fill="#FFEAB7"/>
        <circle cx="66" cy="126" r="2.8" fill="#FFEAB7"/>
      </g>
    </g>

    <clipPath id="panelClip">
      <path d="M-62 -140
               Q-76 -117 -76 -92
               L-76 48
               Q-76 79 -56 96
               Q-35 113 0 122
               Q35 113 56 96
               Q76 79 76 48
               L76 -92
               Q76 -117 62 -140
               Z"/>
    </clipPath>

    <g id="innerFlame">
      <ellipse cx="0" cy="18" rx="58" ry="86" fill="url(#candleGlow)" opacity="0.75" filter="url(#softGlow)"/>
      <ellipse cx="0" cy="34" rx="34" ry="54" fill="url(#candleGlow)" opacity="0.65"/>
      <path d="M0 -8 C18 10 18 36 0 50 C-18 36 -18 10 0 -8Z" fill="#FFF6CE" opacity="0.95"/>
      <path d="M0 8 C10 18 10 31 0 39 C-10 31 -10 18 0 8Z" fill="#FFB13C" opacity="0.95"/>
      <rect x="-3" y="43" width="6" height="22" rx="2" fill="#6D3D00" opacity="0.9"/>
    </g>
  </defs>

  <g transform="translate(300 400)">
    <use href="#lanternBodyTemplate"/>
    <g clip-path="url(#panelClip)">
      <path d="M-62 -140 Q-76 -117 -76 -92 L-76 48 Q-76 79 -56 96 Q-35 113 0 122 Q35 113 56 96 Q76 79 76 48 L76 -92 Q76 -117 62 -140 Z" fill="url(#blueGlass)"/>
      <path d="M-62 -140 Q-76 -117 -76 -92 L-76 48 Q-76 79 -56 96 Q-35 113 0 122 Q35 113 56 96 Q76 79 76 48 L76 -92 Q76 -117 62 -140 Z" fill="url(#arabesqueDots)" opacity="0.35"/>
      <path d="M-45 -150 Q20 -15 -18 130" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="16" stroke-linecap="round"/>
      <path d="M12 -145 Q78 -10 30 122" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="10" stroke-linecap="round"/>
      <use href="#innerFlame" transform="translate(0 -6)"/>
      <g opacity="0.9">
        <g transform="translate(-30 -78)"><use href="#starCut"/></g>
        <g transform="translate(30 -18) scale(1.05)"><use href="#starCut"/></g>
        <g transform="translate(-2 54) scale(1.2)"><use href="#crescentCut"/></g>
      </g>
    </g>
    <path d="M-38 -124 V108 M38 -124 V108" stroke="#FFEAB8" stroke-opacity="0.55" stroke-width="1.4"/>
    <path d="M-62 -48 H62 M-58 20 H58 M-46 84 H46" stroke="#FFEAB8" stroke-opacity="0.45" stroke-width="1.2"/>
  </g>

  <g transform="translate(800 395) scale(1.07)">
    <use href="#lanternBodyTemplate"/>
    <g clip-path="url(#panelClip)">
      <path d="M-62 -140 Q-76 -117 -76 -92 L-76 48 Q-76 79 -56 96 Q-35 113 0 122 Q35 113 56 96 Q76 79 76 48 L76 -92 Q76 -117 62 -140 Z" fill="url(#emeraldGlass)"/>
      <path d="M-62 -140 Q-76 -117 -76 -92 L-76 48 Q-76 79 -56 96 Q-35 113 0 122 Q35 113 56 96 Q76 79 76 48 L76 -92 Q76 -117 62 -140 Z" fill="url(#arabesqueDots)" opacity="0.32"/>
      <ellipse cx="0" cy="0" rx="64" ry="122" fill="url(#candleGlow)" opacity="0.22"/>
      <path d="M-20 -152 Q48 -12 -6 130" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="14" stroke-linecap="round"/>
      <path d="M-58 -100 C-8 -80 8 -28 -38 10 C7 38 6 86 -28 112" stroke="#E6FFF4" stroke-opacity="0.22" stroke-width="4" fill="none"/>
      <path d="M58 -100 C8 -80 -8 -28 38 10 C-7 38 -6 86 28 112" stroke="#E6FFF4" stroke-opacity="0.22" stroke-width="4" fill="none"/>
      <use href="#innerFlame" transform="translate(0 0) scale(1.08)"/>
      <g opacity="0.92">
        <g transform="translate(0 -78) scale(1.15)"><use href="#crescentCut"/></g>
        <g transform="translate(-34 -18)"><use href="#starCut"/></g>
        <g transform="translate(34 -18)"><use href="#starCut"/></g>
        <g transform="translate(0 58) scale(0.95)"><use href="#starCut"/></g>
      </g>
    </g>
    <path d="M-52 -112 Q0 -76 52 -112" stroke="#FFF2C6" stroke-opacity="0.55" stroke-width="1.5" fill="none"/>
    <path d="M-52 -16 Q0 18 52 -16" stroke="#FFF2C6" stroke-opacity="0.55" stroke-width="1.5" fill="none"/>
    <path d="M-48 82 Q0 108 48 82" stroke="#FFF2C6" stroke-opacity="0.55" stroke-width="1.5" fill="none"/>
  </g>

  <g transform="translate(1290 405) scale(0.96)">
    <use href="#lanternBodyTemplate"/>
    <g clip-path="url(#panelClip)">
      <path d="M-62 -140 Q-76 -117 -76 -92 L-76 48 Q-76 79 -56 96 Q-35 113 0 122 Q35 113 56 96 Q76 79 76 48 L76 -92 Q76 -117 62 -140 Z" fill="url(#violetGlass)"/>
      <path d="M-62 -140 Q-76 -117 -76 -92 L-76 48 Q-76 79 -56 96 Q-35 113 0 122 Q35 113 56 96 Q76 79 76 48 L76 -92 Q76 -117 62 -140 Z" fill="url(#arabesqueDots)" opacity="0.28"/>
      <path d="M-58 -130 C-10 -115 -2 -74 -40 -48 C0 -25 10 24 -30 52 C4 74 10 104 -20 118"
            stroke="#FFE9FF" stroke-opacity="0.18" stroke-width="6" fill="none"/>
      <path d="M58 -130 C10 -115 2 -74 40 -48 C0 -25 -10 24 30 52 C-4 74 -10 104 20 118"
            stroke="#FFE9FF" stroke-opacity="0.18" stroke-width="6" fill="none"/>
      <ellipse cx="0" cy="10" rx="70" ry="130" fill="url(#candleGlow)" opacity="0.16"/>
      <use href="#innerFlame" transform="translate(0 -2) scale(0.94)"/>
      <g opacity="0.9">
        <g transform="translate(-28 -82) scale(0.9)"><use href="#crescentCut"/></g>
        <g transform="translate(24 -76) scale(0.85)"><use href="#starCut"/></g>
        <g transform="translate(-24 -4) scale(0.95)"><use href="#starCut"/></g>
        <g transform="translate(24 48) scale(1.05)"><use href="#crescentCut"/></g>
      </g>
    </g>
    <path d="M-60 -78 H60 M-55 6 H55 M-42 92 H42" stroke="#FFEFCB" stroke-opacity="0.38" stroke-width="1.2"/>
    <path d="M-28 -126 L28 118 M28 -126 L-28 118" stroke="#FFEFCB" stroke-opacity="0.22" stroke-width="1"/>
  </g>
</svg>
